name: deploy-backend

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image to ACR
        run: |
          az acr build --registry "${{ secrets.ACR_NAME }}" \
            --image inchronicle-backend:${{ github.sha }} \
            --image inchronicle-backend:latest ./backend

      - name: Update Web App container image
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZ_RG }}" \
            --name "${{ secrets.BACKEND_APPNAME }}" \
            --docker-custom-image-name "${{ secrets.ACR_NAME }}.azurecr.io/inchronicle-backend:${{ github.sha }}"

      - name: Set App Settings
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZ_RG }}" \
            --name "${{ secrets.BACKEND_APPNAME }}" \
            --settings ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Restart Web App
        run: az webapp restart -g "${{ secrets.AZ_RG }}" -n "${{ secrets.BACKEND_APPNAME }}"

      - name: Verify deployment health
        run: |
          echo "Waiting for container restart and migration..."
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5 — waiting 60s..."
            sleep 60
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ secrets.BACKEND_APPNAME }}.azurewebsites.net/health")
            echo "Health check status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" -lt 500 ] && [ "$HTTP_STATUS" -ne 000 ]; then
              echo "Backend healthy after deploy"
              exit 0
            fi
          done
          echo "::error::Backend still unhealthy after 5 attempts (last status: $HTTP_STATUS)"
          exit 1

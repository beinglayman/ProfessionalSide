<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototype 6A — Hover Peek: Floating Preview Card | inchronicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              DEFAULT: '#5D259F',
              light: '#F3EBFC',
              100: '#E8D7F9',
            },
            offblack: '#1a1a2e',
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #1a1a2e; background: #f9fafb; margin: 0; }

    /* Floating preview card */
    .preview-card {
      position: absolute;
      width: 320px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12), 0 4px 10px rgba(0,0,0,0.06);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity 150ms ease, transform 150ms ease;
    }
    .preview-card.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    /* CSS triangle arrow pointing left */
    .preview-card::before {
      content: '';
      position: absolute;
      top: 32px;
      left: -8px;
      width: 0; height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 8px solid #e5e7eb;
    }
    .preview-card::after {
      content: '';
      position: absolute;
      top: 32px;
      left: -7px;
      width: 0; height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 8px solid #fff;
    }

    /* Arrow on the right side (when preview is placed left) */
    .preview-card.arrow-right::before {
      left: auto; right: -8px;
      border-right: none;
      border-left: 8px solid #e5e7eb;
    }
    .preview-card.arrow-right::after {
      left: auto; right: -7px;
      border-right: none;
      border-left: 8px solid #fff;
    }

    /* Side panel */
    .side-panel {
      position: fixed;
      top: 64px; right: 0; bottom: 0;
      width: 60%;
      background: #fff;
      box-shadow: -4px 0 20px rgba(0,0,0,0.08);
      transform: translateX(100%);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 40;
      overflow-y: auto;
    }
    .side-panel.open { transform: translateX(0); }

    /* Overlay */
    .panel-overlay {
      position: fixed; inset: 0; top: 64px;
      background: rgba(0,0,0,0.15);
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }
    .panel-overlay.visible { opacity: 1; pointer-events: auto; }

    /* Story card hover */
    .story-card {
      transition: box-shadow 200ms ease, border-color 200ms ease;
      cursor: pointer;
      position: relative;
    }
    .story-card:hover {
      box-shadow: 0 4px 12px rgba(93,37,159,0.1);
      border-color: #E8D7F9;
    }

    /* Scrollbar */
    .side-panel::-webkit-scrollbar { width: 6px; }
    .side-panel::-webkit-scrollbar-track { background: transparent; }
    .side-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* Action buttons in detail */
    .action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500;
      transition: all 150ms ease; cursor: pointer; border: 1px solid #e5e7eb;
      background: #fff; color: #1a1a2e;
    }
    .action-btn:hover { background: #f3ebfc; border-color: #E8D7F9; color: #5D259F; }
    .action-btn.primary { background: #5D259F; color: #fff; border-color: #5D259F; }
    .action-btn.primary:hover { background: #4a1d80; }

    /* Transition for list width */
    .story-list-container { transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1), padding 300ms ease; }
  </style>
</head>
<body>

  <!-- Sticky Header -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-200 z-50 flex items-center px-6">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <span class="text-lg font-bold text-offblack tracking-tight">inchronicle</span>
    </div>
    <div class="ml-auto flex items-center gap-4">
      <span class="text-sm text-gray-500">Stories</span>
      <div class="w-8 h-8 rounded-full bg-brand-light flex items-center justify-center text-brand font-semibold text-sm">HA</div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-16 min-h-screen">
    <div class="flex">
      <!-- Story List -->
      <div id="storyList" class="story-list-container w-full p-6">
        <div class="max-w-4xl mx-auto">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-2xl font-bold text-offblack">Your Stories</h1>

            </div>
            <button class="action-btn primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

          <div id="cardContainer" class="flex flex-col gap-3"></div>

      <!-- Side Panel -->

  <!-- Floating Preview Card -->
  <div class="preview-card" id="previewCard">

  <script>
    // ── Mock Data ──
    const stories = [
      {

        situation: 'Our legacy on-premise infrastructure was reaching end-of-life, causing increasing downtime incidents averaging 4 hours per month. The CTO mandated a full cloud migration within Q3 to support our growing customer base of 50K+ users.',
        task: 'I was tasked with leading a cross-functional team of 8 engineers to architect and execute the migration strategy. The goal was zero-downtime migration with less than 2% performance regression on critical API endpoints.',
        action: 'I designed a phased migration plan starting with stateless microservices, then databases using AWS DMS, and finally the monolith decomposition. I set up a parallel environment with automated canary deployments using AWS CodePipeline. Implemented comprehensive monitoring with CloudWatch dashboards and established rollback procedures for each phase. Conducted weekly migration reviews with stakeholders to maintain alignment.',

        situation: 'User analytics revealed that 62% of new signups abandoned the onboarding flow before completing their profile setup. Customer support tickets related to confusion during onboarding had increased by 40% quarter-over-quarter.',
        task: 'I needed to redesign the entire onboarding experience to reduce abandonment rates below 30% and decrease support tickets by at least 50%. The redesign had to be completed within a 6-week sprint cycle.',
        action: 'Conducted user interviews with 15 churned users to identify friction points. Collaborated with the design team to create a progressive disclosure pattern that broke the 12-step flow into 4 contextual stages. Built interactive prototypes in Figma and ran A/B tests with 2,000 users. Implemented real-time validation and smart defaults based on user role selection.',
        result: 'Reduced onboarding abandonment from 62% to 18%, exceeding the target by 12 percentage points. Support tickets related to onboarding dropped by 73%. Average time-to-first-value decreased from 14 minutes to 4.5 minutes.',

      {
        id: 3,
        title: 'Reduced API Latency by 40%',
        framework: 'SOAR',
        status: 'Published',
        sources: ['GitHub', 'Datadog'],
        situation: 'Performance monitoring in Datadog showed our core API endpoints averaging 340ms response time, with P99 latencies spiking to 1.2 seconds during peak hours. This was directly impacting user satisfaction scores and causing timeouts for mobile clients.',
        task: 'The objective was to bring average response times below 200ms and P99 under 500ms without requiring additional infrastructure spend. I needed to identify bottlenecks and implement optimizations within the existing architecture.',
        action: 'Profiled all critical endpoints using Datadog APM traces to identify the heaviest database queries. Implemented Redis caching for frequently accessed data with intelligent TTL strategies. Refactored N+1 query patterns in the ORM layer and added database connection pooling. Introduced response compression and optimized JSON serialization. Deployed changes incrementally with feature flags to monitor impact.',

        result: 'App Store rating improved from 2.8 to 4.6 stars within 60 days of launch. 30-day retention increased from 23% to 41%, surpassing the industry benchmark. App load time decreased by 58%, and crash rate dropped to 0.3%. The launch drove a 28% increase in mobile-originated revenue.',

    const sourceIcons = {
      Jira: '<svg width="16" height="16" viewBox="0 0 24 24" fill="#0052CC"><path d="M11.53 2c0 2.4 1.97 4.35 4.35 4.35h1.78v1.7c0 2.4 1.94 4.34 4.34 4.35V2.84a.84.84 0 0 0-.84-.84H11.53zM6.77 6.8a4.36 4.36 0 0 0 4.34 4.34h1.8v1.72a4.36 4.36 0 0 0 4.34 4.34V7.63a.84.84 0 0 0-.83-.83H6.77zM2 11.6a4.35 4.35 0 0 0 4.35 4.35h1.78v1.71c0 2.4 1.94 4.34 4.35 4.34v-9.56a.84.84 0 0 0-.84-.84H2z"/></svg>',
      GitHub: '<svg width="16" height="16" viewBox="0 0 24 24" fill="#333"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>',
      Figma: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8 24c2.2 0 4-1.8 4-4v-4H8c-2.2 0-4 1.8-4 4s1.8 4 4 4z" fill="#0ACF83"/><path d="M4 12c0-2.2 1.8-4 4-4h4v8H8c-2.2 0-4-1.8-4-4z" fill="#A259FF"/><path d="M4 4c0-2.2 1.8-4 4-4h4v8H8C5.8 8 4 6.2 4 4z" fill="#F24E1E"/><path d="M12 0h4c2.2 0 4 1.8 4 4s-1.8 4-4 4h-4V0z" fill="#FF7262"/><path d="M20 12c0 2.2-1.8 4-4 4s-4-1.8-4-4 1.8-4 4-4 4 1.8 4 4z" fill="#1ABCFE"/></svg>',
      Slack: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313z" fill="#E01E5A"/><path d="M8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312z" fill="#36C5F0"/><path d="M18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zm-1.27 0a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.163 0a2.528 2.528 0 0 1 2.523 2.522v6.312z" fill="#2EB67D"/><path d="M15.163 18.956a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.163 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zm0-1.27a2.527 2.527 0 0 1-2.52-2.523 2.527 2.527 0 0 1 2.52-2.52h6.315A2.528 2.528 0 0 1 24 15.163a2.528 2.528 0 0 1-2.522 2.523h-6.315z" fill="#ECB22E"/></svg>',
      Datadog: '<svg width="16" height="16" viewBox="0 0 24 24" fill="#632CA6"><circle cx="12" cy="12" r="10"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">D</text></svg>',
      Confluence: '<svg width="16" height="16" viewBox="0 0 24 24" fill="#1868DB"><path d="M2.73 18.48c-.26.42-.55.9-.55.9a.62.62 0 0 0 .22.85l3.6 2.2a.63.63 0 0 0 .86-.21s.24-.39.54-.87c1.47-2.42 2.94-2.13 5.64-.82l3.28 1.6a.63.63 0 0 0 .84-.3l1.65-3.82a.63.63 0 0 0-.3-.82c-.8-.38-2.34-1.13-3.38-1.64-4.46-2.17-8.2-2.46-12.4 2.93zM21.27 5.52c.26-.42.55-.9.55-.9a.62.62 0 0 0-.22-.85l-3.6-2.2a.63.63 0 0 0-.86.21s-.24.39-.54.87c-1.47 2.42-2.94 2.13-5.64.82L7.68 1.87a.63.63 0 0 0-.84.3L5.19 6a.63.63 0 0 0 .3.82c.8.38 2.34 1.13 3.38 1.64 4.46 2.17 8.2 2.46 12.4-2.93z"/></svg>',
    };

    const statusColors = {
      Published: { bg: 'bg-green-50', text: 'text-green-700', dot: 'bg-green-500' },
      Saved: { bg: 'bg-blue-50', text: 'text-blue-700', dot: 'bg-blue-500' },
      'Needs Polish': { bg: 'bg-amber-50', text: 'text-amber-700', dot: 'bg-amber-500' },
    };

    const frameworkColors = {
      STAR: { bg: 'bg-brand-light', text: 'text-brand' },
      SOAR: { bg: 'bg-purple-50', text: 'text-purple-700' },
      CAR: { bg: 'bg-indigo-50', text: 'text-indigo-700' },
    };

    // ── State ──
    let activePanel = null;
    let hoverTimer = null;
    let isPreviewVisible = false;
    let currentHoveredCard = null;

    // ── Render Cards ──
    function renderCards() {
      const container = document.getElementById('cardContainer');
      container.innerHTML = stories.map((s, i) => {
        const sc = statusColors[s.status];
        const fc = frameworkColors[s.framework];
        return `
          <div class="story-card bg-white border border-gray-200 rounded-lg p-5 flex items-start gap-4"
               data-id="${s.id}" data-index="${i}"
               onmouseenter="handleCardEnter(event, ${i})"
               onmouseleave="handleCardLeave(event, ${i})"
               onclick="openPanel(${i})">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-2 flex-wrap">
                <h3 class="text-base font-semibold text-offblack truncate">${s.title}</h3>
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${fc.bg} ${fc.text}">${s.framework}</span>
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${sc.bg} ${sc.text}">
                  <span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>
                  ${s.status}
                </span>
              </div>
              <p class="text-sm text-gray-500 line-clamp-2 mb-3">${s.situation}</p>
              <div class="flex items-center gap-2">
                ${s.sources.map(src => `<span class="inline-flex items-center gap-1 text-xs text-gray-500 bg-gray-50 px-2 py-1 rounded">${sourceIcons[src] || ''} ${src}</span>`).join('')}
              </div>
            </div>
            <div class="flex-shrink-0 text-gray-400 mt-1">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>`;
      }).join('');
    }

    // ── Hover Preview ──
    function handleCardEnter(event, index) {
      clearTimeout(hoverTimer);
      currentHoveredCard = index;
      hoverTimer = setTimeout(() => {
        showPreview(index, event.currentTarget);
      }, 200);
    }

    function handleCardLeave(event, index) {
      clearTimeout(hoverTimer);
      const preview = document.getElementById('previewCard');
      // Check if mouse moved to preview card
      setTimeout(() => {
        if (!preview.matches(':hover') && currentHoveredCard === index) {
          hidePreview();
        }
      }, 50);
    }

    // Preview card mouse handlers
    document.getElementById('previewCard').addEventListener('mouseenter', () => {
      clearTimeout(hoverTimer);
    });
    document.getElementById('previewCard').addEventListener('mouseleave', () => {
      hidePreview();
    });

    function showPreview(index, cardEl) {
      const story = stories[index];
      const preview = document.getElementById('previewCard');
      const content = document.getElementById('previewContent');
      const sc = statusColors[story.status];
      const fc = frameworkColors[story.framework];

      content.innerHTML = `
        <h4 class="text-sm font-semibold text-offblack mb-2">${story.title}</h4>
        <div class="flex items-center gap-2 mb-3">
          <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${fc.bg} ${fc.text}">${story.framework}</span>
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${sc.bg} ${sc.text}">
            <span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>
            ${story.status}
          </span>
        </div>
        <p class="text-xs text-gray-600 leading-relaxed mb-3">${story.situation}</p>
        <div class="bg-brand-light rounded-md px-3 py-2 mb-3">
          <span class="text-xs font-medium text-brand">${story.metric}</span>
        </div>
        <a href="#" onclick="event.preventDefault(); event.stopPropagation(); hidePreview(); openPanel(${index});"
           class="text-xs font-medium text-brand hover:underline inline-flex items-center gap-1">
          Click to open
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>`;

      // Position the preview card
      const rect = cardEl.getBoundingClientRect();
      const windowWidth = window.innerWidth;
      const previewWidth = 320;
      const gap = 12;

      preview.classList.remove('arrow-right');

      let left, top;
      top = rect.top + window.scrollY - 10;

      if (rect.right + gap + previewWidth < windowWidth) {
        // Place to the right
        left = rect.right + gap;
      } else {
        // Place to the left
        left = rect.left - previewWidth - gap;
        preview.classList.add('arrow-right');
      }

      preview.style.top = top + 'px';
      preview.style.left = left + 'px';
      preview.classList.add('visible');
      isPreviewVisible = true;
    }

    function hidePreview() {
      const preview = document.getElementById('previewCard');
      preview.classList.remove('visible');
      isPreviewVisible = false;
      currentHoveredCard = null;
    }

    // ── Side Panel ──
    function openPanel(index) {
      hidePreview();
      const story = stories[index];
      const panel = document.getElementById('sidePanel');
      const overlay = document.getElementById('panelOverlay');
      const list = document.getElementById('storyList');
      const sc = statusColors[story.status];
      const fc = frameworkColors[story.framework];

      const sections = story.framework === 'SOAR'
        ? [
            { label: 'Situation', content: story.situation },
            { label: 'Obstacle', content: story.task },
            { label: 'Action', content: story.action },
            { label: 'Result', content: story.result },
          ]
        : story.framework === 'CAR'
        ? [
            { label: 'Challenge', content: story.situation },
            { label: 'Action', content: story.action },
            { label: 'Result', content: story.result },
          ]
        : [
            { label: 'Situation', content: story.situation },
            { label: 'Task', content: story.task },
            { label: 'Action', content: story.action },
            { label: 'Result', content: story.result },
          ];

      document.getElementById('panelContent').innerHTML = `
        <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between z-10">
          <h2 class="text-lg font-bold text-offblack truncate pr-4">${story.title}</h2>
          <button onclick="closePanel()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors flex-shrink-0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="p-6">
          <div class="flex items-center gap-2 mb-4 flex-wrap">
            <span class="inline-flex items-center px-2.5 py-1 rounded text-xs font-medium ${fc.bg} ${fc.text}">${story.framework} Framework</span>
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-medium ${sc.bg} ${sc.text}">
              <span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>
              ${story.status}
            </span>
          </div>
          <div class="flex items-center gap-2 mb-6">
            ${story.sources.map(src => `<span class="inline-flex items-center gap-1.5 text-xs text-gray-600 bg-gray-50 border border-gray-200 px-2.5 py-1 rounded-md">${sourceIcons[src] || ''} ${src}</span>`).join('')}
          </div>
          <div class="bg-brand-light rounded-lg px-4 py-3 mb-6">
            <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Key Metric</div>
            <div class="text-sm font-semibold text-brand">${story.metric}</div>
          </div>
          <div class="space-y-5">
            ${sections.map(sec => `
              <div>
                <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">${sec.label}</h4>
                <p class="text-sm text-gray-700 leading-relaxed">${sec.content}</p>
              </div>
            `).join('')}
          </div>
          <div class="border-t border-gray-200 mt-6 pt-5 flex items-center gap-3 flex-wrap">
            <button class="action-btn" onclick="navigator.clipboard.writeText('${story.title}'); this.innerHTML='<svg width=\\'14\\' height=\\'14\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\' stroke-linecap=\\'round\\'><polyline points=\\'20 6 9 17 4 12\\'/></svg> Copied!'; setTimeout(() => this.innerHTML='<svg width=\\'14\\' height=\\'14\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\' stroke-linecap=\\'round\\'><rect x=\\'9\\' y=\\'9\\' width=\\'13\\' height=\\'13\\' rx=\\'2\\'/><path d=\\'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\\'/></svg> Copy', 2000)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
            <button class="action-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              Regenerate
            </button>
            <button class="action-btn primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Publish
            </button>
            <button class="action-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
              Share
            </button>
          </div>
        </div>`;

      // Animate open
      list.style.width = '40%';
      panel.classList.add('open');
      overlay.classList.add('visible');
      activePanel = index;

      // Highlight active card
      document.querySelectorAll('.story-card').forEach((c, ci) => {
        c.style.borderLeftColor = ci === index ? '#5D259F' : '';
        c.style.borderLeftWidth = ci === index ? '3px' : '';
      });
    }

    function closePanel() {
      const panel = document.getElementById('sidePanel');
      const overlay = document.getElementById('panelOverlay');
      const list = document.getElementById('storyList');

      panel.classList.remove('open');
      overlay.classList.remove('visible');
      list.style.width = '100%';
      activePanel = null;

      document.querySelectorAll('.story-card').forEach(c => {
        c.style.borderLeftColor = '';
        c.style.borderLeftWidth = '';
      });
    }

    // Overlay click to close
    document.getElementById('panelOverlay').addEventListener('click', closePanel);

    // Escape to close
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && activePanel !== null) closePanel();
    });

    // Hide preview on scroll
    window.addEventListener('scroll', () => {
      if (isPreviewVisible) hidePreview();
    }, { passive: true });

    // ── Init ──
    renderCards();
  </script>
</body>
</html>
